<!doctype html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focusly — Panell de Control</title>
    <link rel="stylesheet" href="../css/dashboard.css" />
  </head>
  <body class="app-container">
    <header class="app-header">
      <div class="header-content">
        <div class="brand">
          <span class="brand-logo"></span>
          <h1 class="brand-name">Focusly</h1>
        </div>
        <nav class="header-nav">
          <div class="user-status">
            <span class="status-indicator"></span>
            <span class="status-text">Mode Focus Actiu</span>
          </div>
          <button class="user-profile">
            <img src="assets/avatar-placeholder.png" alt="Perfil" />
          </button>
        </nav>
      </div>
    </header>

    <main class="app-main">
      <div class="layout-grid">
        <aside class="sidebar">
          <section class="widget pomodoro-widget">
            <header class="widget-header">
              <h2 class="widget-title">Temporitzador</h2>
              <button class="settings-icon">⚙️</button>
            </header>
            <div class="timer-display">
              <span class="time-remaining">25:00</span>
            </div>
            <div class="timer-controls">
              <button class="btn-main">Començar sessió</button>
              <div class="btn-group">
                <button class="btn-ghost">Pausa</button>
                <button class="btn-ghost">Reiniciar</button>
              </div>
            </div>
          </section>

          <section class="widget tags-widget">
            <h2 class="widget-title">Etiquetes de sessió</h2>
            <div class="tag-cloud">
              <button class="tag active">Treball</button>
              <button class="tag">Estudi</button>
              <button class="tag">Personal</button>
              <button class="tag-add">+ Nova</button>
            </div>
          </section>
        </aside>

        <section class="workspace">
          <div class="workspace-card">
            <div class="workspace-header">
              <div class="header-tabs">
                <button class="tab active">Tasques del dia</button>
                <button class="tab">Notes ràpides</button>
              </div>
            </div>

            <div class="workspace-content">
              <div class="empty-state">
                <div class="empty-illustration">🍃</div>
                <h3>Tot en ordre</h3>
                <p>Encara no tens cap tasca programada per a aquesta sessió.</p>
                <button class="btn-primary-outline">
                  + Afegeix la teva primera tasca
                </button>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
    <script src="../js/app.js"></script>

    <footer class="app-footer">
      <div class="footer-info">
        <span class="info-item"
          ><strong>Sessió:</strong> 0 de 4 completades</span
        >
        <span class="info-item"><strong>Ratxa:</strong> 5 dies</span>
      </div>
      <div class="footer-legal">
        <span>Focusly © 2026 — Productivitat amb propòsit</span>
      </div>
    </footer>
  </body>
</html>
